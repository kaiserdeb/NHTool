name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0.0, v1.1.0, v2.0.0-beta.1

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history needed for MinVer to resolve version from tags

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Version from tag: $TAG"
          echo "PACKAGE_VERSION=$TAG" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore NHTool/NHTool.csproj

      - name: Build
        run: dotnet build NHTool/NHTool.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack NHTool/NHTool.csproj -c Release --no-build --output ./artifacts

      - name: Show package version
        run: ls -la ./artifacts/ && dotnet tool install --global --add-source ./artifacts nh-tool && nh-tool --version || true

      - name: Publish to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true
