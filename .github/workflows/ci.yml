name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore NHTool/NHTool.csproj

      - name: Build
        run: dotnet build NHTool/NHTool.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack NHTool/NHTool.csproj -c Release --no-build --output ./artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: nupkg
          path: ./artifacts/*.nupkg
